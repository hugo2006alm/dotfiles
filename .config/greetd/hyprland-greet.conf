# Minimal Hyprland configuration for ReGreet
autogenerated = 0

exec-once = sh -c 'regreet; hyprctl dispatch exit'
exec-once = sh -c 'sleep 0.5 && hyprctl dismissnotify -1'

input {
    kb_layout = pt
    kb_variant =
    kb_options =
}

ecosystem {
    no_update_news = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

animations {
    enabled = false
}

# Ignore all keyboard shortcuts
binds {
    pass_mouse_when_bound = false
}
