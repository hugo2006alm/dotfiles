# ── Core ──────────────────────────────────────────────
exec-once = swww-daemon
exec-once = waybar
exec-once = mako
exec-once = elephant
exec-once = walker --gapplication-service

# ── System ────────────────────────────────────────────
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --watch cliphist store
exec-once = hyprsunset

# Export Wayland/Hyprland environment to systemd user and D-Bus.
# Needed for xdg-desktop-portal-hyprland, screensharing, Electron apps, etc.
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE HYPRLAND_INSTANCE_SIGNATURE
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE HYPRLAND_INSTANCE_SIGNATURE

# Do NOT start xdg-desktop-portal-hyprland manually here.
# It is activated by xdg-desktop-portal/systemd/D-Bus when needed.

# ── Wallpaper ─────────────────────────────────────────
exec-once = swww img ~/wallpapers/shade-raid/wallpaper_0.jpg --transition-type wipe --transition-angle 30

# ── Waybar Drawers ────────────────────────────────────
exec-once = ~/.config/hypr/scripts/gen-drawers.sh && hyprctl reload

# ── Apps ──────────────────────────────────────────────
exec-once = env ELECTRON_OZONE_PLATFORM_HINT=wayland vesktop --ozone-platform=wayland --enable-features=UseOzonePlatform,WebRTCPipeWireCapturer --disable-features=ScreenAIOCREnabled
exec-once = spotify
exec-once = steam -silent
exec-once = heroic --no-gui
exec-once = bitwarden
